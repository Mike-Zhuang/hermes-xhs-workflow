name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Static and security lint
        run: |
          python -m pip install --disable-pip-version-check ruff==0.12.2
          ruff check scripts tests
          ruff check --select S scripts tests
          ruff format --check scripts tests
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: Compile check
        run: python -m compileall -q scripts tests
      - name: CLI smoke test
        run: |
          python scripts/xhs_workflow.py --help
          python scripts/xhs_readonly_adapter.py --help
